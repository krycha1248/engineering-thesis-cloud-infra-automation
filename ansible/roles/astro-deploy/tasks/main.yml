---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - rsync
    state: present
    update_cache: true
- name: Download NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource.gpg
    mode: '0644'
- name: Add Node.js 24 repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_24.x nodistro main"
    filename: nodesource
    state: present
- name: Install Node.js 24
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
- name: Check if pnpm is installed
  ansible.builtin.command: pnpm -v
  register: pnpm_check
  failed_when: false
  changed_when: false
- name: Install pnpm globally if missing
  ansible.builtin.command: npm install -g pnpm
  when: pnpm_check.rc != 0
  changed_when: pnpm_check.rc != 0
  become: true
- name: Clone Astro repo
  ansible.builtin.git:
    single_branch: true
    version: master
    dest: /tmp/my-website
    repo: https://github.com/krycha1248/my-website.git
- name: Run pnpm install
  community.general.npm:
    path: /tmp/my-website
    executable: /usr/bin/pnpm
- name: Build npm package
  ansible.builtin.command: "pnpm run build"
  args:
    chdir: /tmp/my-website
  register: build_result
  changed_when: build_result.rc == 0
  when: not lookup('file', '/tmp/my-website/dist', errors='ignore')
  environment:
    PUBLIC_SITE_URL: "https://{{ domain_name }}"
- name: Remove htaccess file
  ansible.builtin.file:
    state: absent
    path: /tmp/my-website/dist/.htaccess
- name: Ensure target directory exists
  ansible.builtin.file:
    path: "/var/www/{{ domain_name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
- name: Deploy Astro build (dist) to /var/www/shiplify.pl
  ansible.posix.synchronize:
    src: /tmp/my-website/dist/
    dest: "/var/www/{{ domain_name }}/"
    recursive: true
    delete: true
    rsync_opts:
      - "--chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r"
      - "--chown=www-data:www-data"
  delegate_to: "{{ inventory_hostname }}"
- name: Remove source directory after deploy
  ansible.builtin.file:
    path: /tmp/my-website
    state: absent
- name: Install apache2 web server
  ansible.builtin.package:
    name: apache2
    state: present
  notify: Autostart apache2
- name: Pass apache2 config
  ansible.builtin.template:
    src: apache2.conf.j2
    dest: "/etc/apache2/sites-available/{{ domain_name }}.conf"
    mode: "0644"
- name: Enable config
  ansible.builtin.file:
    src: "/etc/apache2/sites-available/{{ domain_name }}.conf"
    dest: "/etc/apache2/sites-enabled/{{ domain_name }}.conf"
    state: link
  notify: Restart apache2
- name: Open firewall ports
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
  with_items:
    - 80
    - 443
- name: Save iptables rules
  community.general.iptables_state:
    state: saved
    ip_version: "{{ item.version }}"
    path: "/etc/iptables/rules.{{ item.name }}"
  with_items:
    - { version: 'ipv4', name: 'v4' }
    - { version: 'ipv6', name: 'v6' }
...
